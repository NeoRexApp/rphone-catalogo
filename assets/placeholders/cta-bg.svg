<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08133a"/>
      <stop offset="1" stop-color="#050712"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 420) rotate(30) scale(680 420)">
      <stop offset="0" stop-color="#00D4FF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 520) rotate(-20) scale(720 520)">
      <stop offset="0" stop-color="#2B6CFF" stop-opacity=".20"/>
      <stop offset="1" stop-color="#2B6CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20" y="-20" width="1640" height="940" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <g filter="url(#blur)" opacity=".55">
    <rect x="180" y="220" width="520" height="360" rx="28" fill="#ffffff" fill-opacity=".10"/>
    <rect x="240" y="180" width="520" height="360" rx="28" fill="#ffffff" fill-opacity=".08"/>
    <rect x="300" y="140" width="520" height="360" rx="28" fill="#ffffff" fill-opacity=".06"/>
    <path d="M900 650c140-120 240-160 420-180" stroke="#ffffff" stroke-opacity=".16" stroke-width="24" stroke-linecap="round"/>
    <path d="M860 580c160-140 280-200 520-240" stroke="#00D4FF" stroke-opacity=".18" stroke-width="18" stroke-linecap="round"/>
  </g>

  <rect width="1600" height="900" fill="#000" fill-opacity=".15"/>
</svg>
